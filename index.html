<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Puentes: Juego de Conexión</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.5s ease-out forwards;
        }
        /* Optimizaciones táctiles */
        .select-none { -webkit-user-select: none; user-select: none; }
        .touch-manipulation { touch-action: manipulation; }
        
        /* Ocultar scrollbar pero permitir scroll en el hint */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-900 min-h-screen">

    <div id="app" class="max-w-md mx-auto relative h-full flex flex-col min-h-screen">
        <!-- El contenido se inyectará aquí vía JavaScript -->
    </div>

    <script>
        // --- BASE DE DATOS DE PREGUNTAS ---
        const rawQuestions = [
            { text: '¿Tú cómo notas cuando alguien solo te atrae físicamente o cuando ya empiezas a sentir que te gusta "de verdad" por cómo es?', hint: 'Ayuda a diferenciar el deseo impulsivo (amígdala) de la valoración personal profunda.' },
            { text: 'Si alguien te gusta mucho, ¿crees que es mejor ser amigos un tiempo antes de dar el paso de ser "algo más"?', hint: 'Fomenta el concepto de intimidad gradual y la amistad como base del amor.' },
            { text: 'A veces el cuerpo va muy rápido (hormonas, nervios), pero el corazón necesita más tiempo para aclararse, ¿te ha pasado alguna vez sentir ese "vértigo"?', hint: 'Normaliza los cambios biológicos y valida la ansiedad natural del enamoramiento.' },
            { text: '¿Qué cualidades te harían decir "esta persona vale la pena" más allá de que sea guapo o guapa?', hint: 'Traslada el foco de lo estético hacia los valores y el carácter.' },
            { text: 'Si alguien que te gusta te dijera que no, ¿cómo crees que te sentirías? Recuerda que eso no quita ni un poquito lo valioso que eres.', hint: 'Trabaja la tolerancia a la frustración y desliga la autoestima del rechazo externo.' },
            { text: '¿Crees que un abrazo o un beso significan lo mismo para un chico que para una chica, o depende de cada uno?', hint: 'Abre el debate sobre los lenguajes del amor y las construcciones sociales de género.' },
            { text: 'Dicen que "querer bien lleva tiempo", ¿tú qué piensas de esas parejas que empiezan súper rápido y a los dos días ya son novios?', hint: 'Cuestiona la inmediatez y fomenta la paciencia en la construcción de vínculos.' },
            { text: '¿Qué gestos de cariño te parecen bonitos y cuáles te harían sentir incómodo o que "no tocan" a tu edad?', hint: 'Establece límites personales y ayuda a identificar el consentimiento y el pudor.' },
            { text: '¿Cómo haces para que estar ilusionado con alguien no te quite tiempo para tus amigos de siempre o para tus estudios?', hint: 'Promueve el equilibrio vital y previene la dependencia emocional absorbente.' },
            { text: '¿Hay algo que te gustaría que nosotros hiciéramos para que te sientas más cómodo contándonos si alguien te gusta?', hint: 'Auditoría parental: permite ajustar el estilo de crianza a las necesidades del adolescente.' },
            { text: '¿Te ha pasado que alguien te parecía perfecto y luego, al conocerlo mejor, viste que tenía sus fallos, como todos?', hint: 'Desmitifica el amor romántico e idealizado, aterrizando en el amor real.' },
            { text: '¿Por qué crees que es importante sentirse bien con uno mismo (autoestima) antes de buscar una pareja?', hint: 'Previene relaciones basadas en la necesidad o en llenar vacíos afectivos.' },
            { text: '¿Sientes que en tu grupo de amigos hay presión por "tener a alguien" solo para no ser el único que no tiene novio/a?', hint: 'Visibiliza la presión de grupo para poder desactivarla desde la conciencia.' },
            { text: 'De lo que ves en nuestra relación (o en otras que admires), ¿hay algo que te gustaría repetir en el futuro y algo que preferirías hacer distinto?', hint: 'Fomenta el aprendizaje por modelado y el pensamiento crítico sobre la familia.' },
            { text: '¿Has oído eso de que en el cariño es fácil dejarse llevar (como en una pendiente resbaladiza) y luego cuesta frenar? ¿Cómo lo ves tú?', hint: 'Introduce sutilmente la noción de autodominio y los riesgos de la escalada física.' },
            { text: '¿Qué es lo que más te gusta de tu forma de ser y que te encantaría que la otra persona supiera valorar?', hint: 'Refuerza el autoconcepto positivo y los talentos personales.' },
            { text: '¿Cómo te das cuenta si estar con alguien te ayuda a ser mejor persona o si, por el contrario, te está "frenando"?', hint: 'Plantea el amor como un motor de crecimiento personal, no de estancamiento.' },
            { text: 'Cuando la emoción fuerte del principio baja un poco (el "subidón" de mariposas), ¿qué crees que mantiene unida a una pareja?', hint: 'Diferencia el enamoramiento (fase química) del amor maduro (decisión y compromiso).' },
            { text: '¿Qué cosas te gustaría saber de una persona (sus valores, qué piensa de la vida) antes de decir que es tu "novio/a"?', hint: 'Entrena la evaluación proactiva de compatibilidad a largo plazo.' },
            { text: 'En un mundo de muchos "likes" en redes, ¿qué crees que hace que una relación sea de verdad especial y profunda?', hint: 'Contrasta la superficialidad digital con la intimidad analógica y real.' }
        ];

        // --- ICONOS SVG ---
        const icons = {
            heart: `<svg viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1" class="w-12 h-12 text-rose-500"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>`,
            heartWhite: `<svg viewBox="0 0 24 24" fill="currentColor" class="w-12 h-12 text-white"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>`,
            user: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-5 h-5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>`,
            users: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-6 h-6"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>`,
            play: `<svg viewBox="0 0 24 24" fill="currentColor" class="w-5 h-5 mr-2"><path d="M5 3l14 9-14 9V3z"></path></svg>`,
            refresh: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-5 h-5"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>`,
            arrow: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-5 h-5 ml-2"><path d="M5 12h14"></path><path d="M12 5l7 7-7 7"></path></svg>`,
            info: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-6 h-6"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>`,
            infoSmall: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-4 h-4 mr-1 inline"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>`,
            bubble: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-10 h-10 text-slate-200 absolute top-8 left-8 opacity-50"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>`
        };

        // --- ESTADO DE LA APLICACIÓN ---
        let state = {
            view: 'intro', // 'intro', 'play', 'end'
            parentName: '',
            teenName: '',
            questions: [],
            currentIndex: 0,
            turn: '', // 'parent', 'teen', 'both'
            showHint: false
        };

        const appDiv = document.getElementById('app');

        // --- LÓGICA DEL NEGOCIO ---
        function shuffleArray(array) {
            let shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        function assignTurn() {
            state.showHint = false;
            const rand = Math.random();
            if (rand < 0.4) state.turn = 'teen';
            else if (rand < 0.8) state.turn = 'parent';
            else state.turn = 'both';
        }

        // --- FUNCIONES DE TRANSICIÓN ---
        window.handleStart = function() {
            const pName = document.getElementById('inputParent').value.trim();
            const tName = document.getElementById('inputTeen').value.trim();
            
            if (!pName || !tName) {
                alert("Por favor, ingresa ambos nombres.");
                return;
            }
            
            state.parentName = pName;
            state.teenName = tName;
            state.questions = shuffleArray(rawQuestions);
            state.currentIndex = 0;
            assignTurn();
            state.view = 'play';
            render();
        };

        window.handleNextQuestion = function() {
            if (state.currentIndex < state.questions.length - 1) {
                state.currentIndex++;
                assignTurn();
            } else {
                state.view = 'end';
            }
            render();
        };

        window.handleBothRespond = function() {
            state.turn = 'both';
            render();
        };

        window.toggleHint = function() {
            state.showHint = !state.showHint;
            render();
        };

        window.resetGame = function() {
            state.view = 'intro';
            state.parentName = '';
            state.teenName = '';
            render();
        };

        window.checkInputs = function() {
            const pName = document.getElementById('inputParent').value.trim();
            const tName = document.getElementById('inputTeen').value.trim();
            const btn = document.getElementById('btnStart');
            
            if (pName && tName) {
                btn.removeAttribute('disabled');
                btn.classList.remove('opacity-50', 'cursor-not-allowed');
            } else {
                btn.setAttribute('disabled', 'true');
                btn.classList.add('opacity-50', 'cursor-not-allowed');
            }
        };

        // --- RENDERIZADO DE VISTAS ---
        function renderIntro() {
            return `
            <div class="flex flex-col items-center justify-center min-h-[80vh] px-6 py-10 text-center animate-fade-in my-auto">
                <div class="w-24 h-24 bg-rose-100 rounded-full flex items-center justify-center mb-6 shadow-inner">
                    ${icons.heart}
                </div>
                <h1 class="text-4xl font-bold text-slate-800 mb-3 tracking-tight">Puentes</h1>
                <p class="text-slate-600 mb-10 text-lg leading-relaxed">
                    Un espacio seguro para hablar de lo que importa, sin filtros y con mucho corazón.
                </p>
                
                <div class="w-full max-w-sm space-y-5">
                    <div class="relative">
                        <div class="absolute left-4 top-1/2 transform -translate-y-1/2 text-slate-400">
                            ${icons.user}
                        </div>
                        <input 
                            type="text" 
                            id="inputParent"
                            placeholder="Nombre del adulto" 
                            value="${state.parentName}"
                            onkeyup="checkInputs()"
                            class="w-full pl-12 pr-4 py-4 rounded-2xl border-2 border-slate-100 focus:border-rose-300 focus:ring-4 focus:ring-rose-50 outline-none transition-all text-slate-700 font-medium text-lg bg-white/70 backdrop-blur-sm shadow-sm"
                        />
                    </div>
                    <div class="relative">
                        <div class="absolute left-4 top-1/2 transform -translate-y-1/2 text-slate-400">
                            ${icons.user}
                        </div>
                        <input 
                            type="text" 
                            id="inputTeen"
                            placeholder="Nombre del hij@ / joven" 
                            value="${state.teenName}"
                            onkeyup="checkInputs()"
                            class="w-full pl-12 pr-4 py-4 rounded-2xl border-2 border-slate-100 focus:border-teal-300 focus:ring-4 focus:ring-teal-50 outline-none transition-all text-slate-700 font-medium text-lg bg-white/70 backdrop-blur-sm shadow-sm"
                        />
                    </div>
                    
                    <button 
                        id="btnStart"
                        onclick="handleStart()"
                        disabled
                        class="w-full mt-6 bg-gradient-to-r from-rose-500 to-orange-400 hover:from-rose-600 hover:to-orange-500 text-white font-bold py-4 px-8 rounded-2xl shadow-lg transform active:scale-95 transition-all flex items-center justify-center opacity-50 cursor-not-allowed touch-manipulation"
                    >
                        ${icons.play}
                        Comenzar Juego
                    </button>
                </div>
            </div>`;
        }

        function renderGame() {
            const currentQ = state.questions[state.currentIndex];
            
            let turnConfig = {
                bg: 'bg-rose-50 border-rose-200',
                text: 'text-rose-700',
                icon: icons.user.replace('class="w-5 h-5"', 'class="w-6 h-6 text-rose-500"'),
                label: `Turno de ${state.teenName}`
            };

            if (state.turn === 'parent') {
                turnConfig = {
                    bg: 'bg-teal-50 border-teal-200',
                    text: 'text-teal-700',
                    icon: icons.user.replace('class="w-5 h-5"', 'class="w-6 h-6 text-teal-500"'),
                    label: `Turno de ${state.parentName}`
                };
            } else if (state.turn === 'both') {
                turnConfig = {
                    bg: 'bg-indigo-50 border-indigo-200',
                    text: 'text-indigo-700',
                    icon: icons.users.replace('text-currentColor', 'text-indigo-500'),
                    label: '¡Responden ambos!'
                };
            }

            return `
            <div class="flex flex-col flex-1 px-4 py-8 animate-fade-in">
                <!-- Header Progress -->
                <div class="flex justify-between items-center mb-8">
                    <span class="text-sm font-semibold text-slate-400 uppercase tracking-wider">
                        Carta ${state.currentIndex + 1} de ${state.questions.length}
                    </span>
                    <button onclick="resetGame()" class="p-2 text-slate-400 hover:text-slate-600 rounded-full bg-white shadow-sm hover:bg-slate-50 transition touch-manipulation">
                        ${icons.refresh}
                    </button>
                </div>

                <!-- The Card -->
                <div class="flex-1 flex flex-col items-center justify-center w-full max-w-sm mx-auto">
                    
                    <!-- Turn Indicator -->
                    <div class="flex items-center space-x-2 px-6 py-2 rounded-full border mb-6 shadow-sm ${turnConfig.bg} ${turnConfig.text} transform -translate-y-4">
                        ${turnConfig.icon}
                        <span class="font-bold text-lg select-none">${turnConfig.label}</span>
                    </div>

                    <!-- Main Question Card -->
                    <div class="bg-white w-full rounded-3xl shadow-xl overflow-hidden border border-slate-100 relative select-none">
                        
                        <!-- Pedagogy Hint Button -->
                        <button 
                            onclick="toggleHint()"
                            class="absolute top-4 right-4 p-4 text-slate-300 hover:text-amber-500 transition-colors z-10 touch-manipulation"
                            title="Pista para el formador"
                        >
                            ${icons.info}
                        </button>

                        <div class="p-8 md:p-10 flex flex-col items-center text-center min-h-[320px] justify-center relative">
                            ${icons.bubble}
                            
                            <h2 class="text-2xl font-bold text-slate-800 leading-snug relative z-10 mt-4">
                                "${currentQ.text}"
                            </h2>

                            <!-- Pedagogy Hint Dropdown -->
                            ${state.showHint ? `
                            <div class="mt-6 p-4 bg-amber-50 rounded-xl border border-amber-100 text-sm text-amber-800 text-left w-full animate-fade-in shadow-inner overflow-y-auto max-h-40 no-scrollbar">
                                <strong class="block mb-1 font-semibold flex items-center">
                                    ${icons.infoSmall} Foco formativo:
                                </strong>
                                ${currentQ.hint}
                            </div>
                            ` : ''}
                        </div>
                    </div>

                    <!-- Action Buttons -->
                    <div class="w-full mt-10 space-y-4">
                        <button 
                            onclick="handleNextQuestion()"
                            class="w-full bg-slate-800 hover:bg-slate-900 text-white font-bold py-5 px-6 rounded-2xl shadow-xl flex items-center justify-center transition-all active:scale-95 touch-manipulation"
                        >
                            Siguiente Carta
                            ${icons.arrow}
                        </button>
                        ${state.turn !== 'both' ? `
                        <button 
                            onclick="handleBothRespond()"
                            class="w-full bg-white hover:bg-slate-50 text-slate-600 font-semibold py-4 px-6 rounded-2xl shadow-sm border border-slate-200 flex items-center justify-center transition-all active:scale-95 touch-manipulation"
                        >
                            Yo también quiero responder
                        </button>
                        ` : ''}
                    </div>
                </div>
            </div>`;
        }

        function renderEnd() {
            return `
            <div class="flex flex-col items-center justify-center flex-1 px-6 py-10 text-center animate-fade-in my-auto">
                <div class="w-24 h-24 bg-gradient-to-tr from-amber-300 to-orange-400 rounded-full flex items-center justify-center mb-6 shadow-lg transform rotate-12">
                    ${icons.heartWhite}
                </div>
                <h2 class="text-3xl font-bold text-slate-800 mb-4">¡Qué gran charla!</h2>
                <p class="text-slate-600 mb-10 text-lg">
                    Gracias, <strong>${state.parentName}</strong> y <strong>${state.teenName}</strong>, por tomarse el tiempo de construir este puente entre ustedes. Las conexiones reales toman tiempo, pero valen oro.
                </p>
                <button 
                    onclick="resetGame()"
                    class="bg-slate-800 text-white font-bold py-4 px-10 rounded-full shadow-xl active:scale-95 transition-all touch-manipulation"
                >
                    Jugar otra vez
                </button>
            </div>`;
        }

        // --- MOTOR DE REDERIZADO PRINCIPAL ---
        function render() {
            if (state.view === 'intro') {
                appDiv.innerHTML = renderIntro();
                // Si había nombres previos, habilitar botón
                if(state.parentName || state.teenName) checkInputs(); 
            } else if (state.view === 'play') {
                appDiv.innerHTML = renderGame();
            } else if (state.view === 'end') {
                appDiv.innerHTML = renderEnd();
            }
        }

        // Iniciar la app
        render();
    </script>
</body>
</html>
